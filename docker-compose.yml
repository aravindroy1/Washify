version: '3.8'
services:
  mongodb:
    image: mongo:latest
    container_name: washify-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  auth-service:
    build: ./auth_service
    container_name: washify-auth
    ports:
      - "8001:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - JWT_SECRET=super_secret_key_change_me_in_production
    depends_on:
      - mongodb

  car-wash-service:
    build: ./car_wash_service
    container_name: washify-car-wash
    ports:
      - "8002:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - JWT_SECRET=super_secret_key_change_me_in_production
    depends_on:
      - mongodb

  booking-service:
    build: ./booking_service
    container_name: washify-booking
    ports:
      - "8003:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - JWT_SECRET=super_secret_key_change_me_in_production
      - NOTIFICATION_URL=http://notification-service:8000
    depends_on:
      - mongodb

  review-service:
    build: ./review_service
    container_name: washify-review
    ports:
      - "8004:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - JWT_SECRET=super_secret_key_change_me_in_production
    depends_on:
      - mongodb

  notification-service:
    build: ./notification_service
    container_name: washify-notification
    ports:
      - "8005:8000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - JWT_SECRET=super_secret_key_change_me_in_production
    depends_on:
      - mongodb

volumes:
  mongodb_data:
