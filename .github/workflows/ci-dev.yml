# ─────────────────────────────────────────────────────────────
# CI Pipeline — DEV (develop branch)
# Copy this file into EVERY microservice repo at:
#   .github/workflows/ci-dev.yml
#
# Image tag format: sha-{first 7 of commit SHA}
# e.g. ghcr.io/washifyapp/auth-service:sha-abc1234
# ─────────────────────────────────────────────────────────────
name: CI — Dev

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  # ── Stage 1: SonarQube Code Quality ──────────────────────
  sonarqube:
    name: Stage 1 — SonarQube
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-sonarqube.yml@main
    with:
      environment: dev
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}

  # ── Stage 2: Snyk Dependency Scan ────────────────────────
  snyk:
    name: Stage 2 — Snyk
    needs: sonarqube
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-snyk.yml@main
    with:
      environment: dev
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}

  # ── Stage 3: Docker Build + Trivy + Push to GHCR ─────────
  build-scan-push:
    name: Stage 3 — Build, Scan & Push
    needs: snyk
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-build-scan-push.yml@main
    with:
      environment: dev
      image_tag: sha-${{ github.sha != '' && github.sha || '0000000' }}
    secrets:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}
