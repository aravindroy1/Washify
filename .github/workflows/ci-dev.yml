name: CI — Dev Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}
  DEV_TEAM_EMAIL: ${{ secrets.MAIL_RECIPIENT }}

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: SonarQube Code Quality Scan
  # ─────────────────────────────────────────────
  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Check SonarQube Quality Gate
        id: quality_gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Send Email — SonarQube SUCCESS
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ env.DEV_TEAM_EMAIL }}
          from: Washify CI <${{ secrets.MAIL_USERNAME }}>
          subject: "✅ [PASS] SonarQube Quality Gate — ${{ github.repository }} (${{ github.sha }})"
          body: |
            Hello Dev Team,

            ✅ SonarQube Quality Gate PASSED for:
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            The pipeline is proceeding to the next stage.

            — Washify CI/CD

      - name: Send Email — SonarQube FAILURE
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ env.DEV_TEAM_EMAIL }}
          from: Washify CI <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ [FAIL] SonarQube Quality Gate — ${{ github.repository }} (${{ github.sha }})"
          body: |
            Hello Dev Team,

            ❌ SonarQube Quality Gate FAILED for:
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}
            Triggered by: ${{ github.actor }}

            Action Required: Fix the code quality issues reported in SonarQube before pushing again.
            SonarQube URL: ${{ secrets.SONAR_HOST_URL }}

            — Washify CI/CD

  # ─────────────────────────────────────────────
  # STAGE 2: Snyk Dependency Vulnerability Scan
  # ─────────────────────────────────────────────
  snyk:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Snyk Scan
        id: snyk_scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all

      - name: Send Email — Snyk SUCCESS
        if: steps.snyk_scan.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ env.DEV_TEAM_EMAIL }}
          from: Washify CI <${{ secrets.MAIL_USERNAME }}>
          subject: "✅ [PASS] Snyk Security Scan — ${{ github.repository }} (${{ github.sha }})"
          body: |
            Hello Dev Team,

            ✅ Snyk Dependency Scan PASSED for:
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}

            No high or critical vulnerabilities were found in the dependencies.

            — Washify CI/CD

      - name: Send Email — Snyk FAILURE
        if: steps.snyk_scan.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ env.DEV_TEAM_EMAIL }}
          from: Washify CI <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ [FAIL] Snyk Security Scan — ${{ github.repository }} (${{ github.sha }})"
          body: |
            Hello Dev Team,

            ❌ Snyk Dependency Scan FAILED for:
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}

            Action Required: High/Critical vulnerabilities were found in dependencies.
            Please run 'snyk test' locally and fix the issues before pushing.

            — Washify CI/CD

      - name: Fail Job if Snyk Found Vulnerabilities
        if: steps.snyk_scan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # STAGE 3: Docker Build
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: snyk
    outputs:
      image_tag: ${{ steps.set_tag.outputs.tag }}
      full_image: ${{ steps.set_tag.outputs.full_image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag (Dev = commit SHA first 7)
        id: set_tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="sha-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> $GITHUB_OUTPUT
          echo "Image will be tagged as: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (not pushed yet — Trivy scans first)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.set_tag.outputs.full_image }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Image as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  # ─────────────────────────────────────────────
  # STAGE 4: Trivy Container Image Security Scan
  # ─────────────────────────────────────────────
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: docker load --input /tmp/image.tar

      - name: Run Trivy Scan
        id: trivy_scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ needs.docker-build.outputs.full_image }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Send Email — Trivy SUCCESS
        if: steps.trivy_scan.outcome == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ env.DEV_TEAM_EMAIL }}
          from: Washify CI <${{ secrets.MAIL_USERNAME }}>
          subject: "✅ [PASS] Trivy Image Scan — ${{ github.repository }} (${{ github.sha }})"
          body: |
            Hello Dev Team,

            ✅ Trivy Container Image Scan PASSED for:
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Image      : ${{ needs.docker-build.outputs.full_image }}

            No HIGH or CRITICAL vulnerabilities found in the container image.
            Proceeding to push to GHCR.

            — Washify CI/CD

      - name: Send Email — Trivy FAILURE
        if: steps.trivy_scan.outcome == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ env.DEV_TEAM_EMAIL }}
          from: Washify CI <${{ secrets.MAIL_USERNAME }}>
          subject: "❌ [FAIL] Trivy Image Scan — ${{ github.repository }} (${{ github.sha }})"
          body: |
            Hello Dev Team,

            ❌ Trivy Container Image Scan FAILED for:
            Repository : ${{ github.repository }}
            Branch     : ${{ github.ref_name }}
            Image      : ${{ needs.docker-build.outputs.full_image }}

            Action Required: HIGH/CRITICAL vulnerabilities found in the Docker image.
            Please review your base image and dependencies.

            — Washify CI/CD

      - name: Fail Job if Trivy Found Vulnerabilities
        if: steps.trivy_scan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # STAGE 5: Push to GHCR (Dev — SHA tag)
  # ─────────────────────────────────────────────
  push-to-ghcr:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [docker-build, trivy]
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: docker load --input /tmp/image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image to GHCR
        run: docker push ${{ needs.docker-build.outputs.full_image }}

  # ─────────────────────────────────────────────
  # STAGE 6: Update GitOps Repo (Dev image tag)
  # ─────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Repo
    runs-on: ubuntu-latest
    needs: [docker-build, push-to-ghcr]
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: WashifyApp/washify-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update Image Tag in Dev Helm Values
        run: |
          SERVICE="${{ github.event.repository.name }}"
          TAG="${{ needs.docker-build.outputs.image_tag }}"
          FILE="gitops/dev/apps/${SERVICE}/values.yaml"
          sed -i "s|tag:.*|tag: ${TAG}|" $FILE
          echo "Updated ${FILE} with tag: ${TAG}"

      - name: Commit and Push to GitOps Repo
        run: |
          cd gitops
          git config user.name "washify-ci-bot"
          git config user.email "ci@washify.app"
          git add .
          git commit -m "chore(dev): update ${{ github.event.repository.name }} image to ${{ needs.docker-build.outputs.image_tag }}"
          git push
