# ─────────────────────────────────────────────────────────────
# CI Pipeline — PRODUCTION (git tag push: v*.*.*)
# Copy this file into EVERY microservice repo at:
#   .github/workflows/ci-prod.yml
#
# Image tag format: {git-tag}
# e.g. ghcr.io/washifyapp/auth-service:v1.2.0
#
# To trigger: git tag v1.0.0 && git push origin v1.0.0
# ─────────────────────────────────────────────────────────────
name: CI — Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Stage 1: SonarQube Code Quality ──────────────────────
  sonarqube:
    name: Stage 1 — SonarQube
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-sonarqube.yml@main
    with:
      environment: prod
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}

  # ── Stage 2: Snyk Dependency Scan ────────────────────────
  snyk:
    name: Stage 2 — Snyk
    needs: sonarqube
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-snyk.yml@main
    with:
      environment: prod
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}

  # ── Stage 3: Docker Build + Trivy + Push to GHCR ─────────
  build-scan-push:
    name: Stage 3 — Build, Scan & Push
    needs: snyk
    uses: WashifyApp/washify-workflows/.github/workflows/reusable-build-scan-push.yml@main
    with:
      environment: prod
      image_tag: ${{ github.ref_name }}
    secrets:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}
