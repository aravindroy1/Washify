# ─────────────────────────────────────────────────────────────
# CI Pipeline — PRODUCTION (Image Promotion)
# Triggered by: git tag v*.*.* pointing to a tested commit
#
# What it does:
#   1. Reads the commit SHA from the git tag
#   2. Pulls the already-tested dev image (sha-xxxxxxx) from GHCR
#   3. Re-tags it with the semantic version (v1.1.1)
#   4. Pushes the re-tagged image to GHCR
#
# NO rebuild. NO re-scanning. The tested dev image is promoted!
#
# How to trigger:
#   git tag v1.1.1 <tested-commit-sha>
#   git push origin v1.1.1
# ─────────────────────────────────────────────────────────────
name: CI — Production (Image Promotion)

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io

jobs:
  promote-image:
    name: Promote Dev Image → Production Tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve SHA and Image Names
        id: vars
        run: |
          # Get the first 7 characters of the commit SHA this tag points to
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          SERVICE="${{ github.event.repository.name }}"

          DEV_IMAGE="${{ env.REGISTRY }}/${REPO_OWNER}/${SERVICE}:sha-${SHORT_SHA}"
          PROD_IMAGE="${{ env.REGISTRY }}/${REPO_OWNER}/${SERVICE}:${{ github.ref_name }}"

          echo "short_sha=${SHORT_SHA}"       >> $GITHUB_OUTPUT
          echo "dev_image=${DEV_IMAGE}"       >> $GITHUB_OUTPUT
          echo "prod_image=${PROD_IMAGE}"     >> $GITHUB_OUTPUT

          echo "Pulling dev image : ${DEV_IMAGE}"
          echo "Pushing prod image: ${PROD_IMAGE}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Dev Image from GHCR
        run: docker pull ${{ steps.vars.outputs.dev_image }}

      - name: Re-Tag as Production Version
        run: |
          docker tag ${{ steps.vars.outputs.dev_image }} ${{ steps.vars.outputs.prod_image }}
          echo "Re-tagged: ${{ steps.vars.outputs.dev_image }} → ${{ steps.vars.outputs.prod_image }}"

      - name: Push Production Image to GHCR
        id: push
        run: docker push ${{ steps.vars.outputs.prod_image }}

      - name: Email — Promotion SUCCESS
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "🚀 [PROD][PROMOTED] ${{ github.event.repository.name }} → ${{ github.ref_name }}"
          body: |
            Hello Dev Team,

            🚀 Production Image Successfully Promoted!

            Service     : ${{ github.repository }}
            Release Tag : ${{ github.ref_name }}
            Dev Image   : ${{ steps.vars.outputs.dev_image }}
            Prod Image  : ${{ steps.vars.outputs.prod_image }}
            Promoted by : ${{ github.actor }}

            ─────────────────────────────────────
            Next Step (Manual):
            Update prod/values.yaml in your GitOps repo:

              image:
                tag: ${{ github.ref_name }}

            Then ArgoCD will auto-deploy to the PROD cluster!
            ─────────────────────────────────────

            — Washify CI/CD

      - name: Email — Promotion FAILED
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_RECIPIENT }}
          from: "Washify CI <${{ secrets.MAIL_USERNAME }}>"
          subject: "❌ [PROD][FAIL] Image Promotion Failed — ${{ github.event.repository.name }} ${{ github.ref_name }}"
          body: |
            Hello Dev Team,

            ❌ Production Image Promotion FAILED

            Service     : ${{ github.repository }}
            Release Tag : ${{ github.ref_name }}
            Dev Image   : ${{ steps.vars.outputs.dev_image }}

            Possible Reasons:
            - The dev image sha-${{ steps.vars.outputs.short_sha }} was never built
              (make sure the develop pipeline ran successfully for this commit)
            - GHCR authentication issue

            — Washify CI/CD
