apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: washify-app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: washify
spec:
  project: default
  source:
    repoURL: https://github.com/aravindroy1/Washify.git
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
