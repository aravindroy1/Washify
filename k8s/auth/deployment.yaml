---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: washify-dev-ns
  name: auth-deployment
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: aravindroy1/washify-auth:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: washify-config
            - secretRef:
                name: washify-secret
          resources:
            requests:
               cpu: "100m"
               memory: "128Mi"
            limits:
               cpu: "500m"
               memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15

