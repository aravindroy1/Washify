---
# Storage Class for MongoDB (Assuming standard default provisioner if none specified)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: washify-mongo-sc
provisioner: kubernetes.io/no-provisioner # Replace with your cloud provider's provisioner (e.g., ebs.csi.aws.com, pd.csi.storage.gke.io) if needed, or local-path for minikube
volumeBindingMode: WaitForFirstConsumer

---
# Headless Service for MongoDB StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  ports:
    - port: 27017
      targetPort: 27017
  clusterIP: None # Headless service
  selector:
    app: mongodb

---
# MongoDB StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  serviceName: "mongodb"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
              name: mongo
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: mongo-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        # storageClassName: washify-mongo-sc # Uncomment and use if you have a specific storage class, otherwise it uses the cluster default
        resources:
          requests:
            storage: 2Gi
